version: '3.8'

services:
  scp-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scp-hub
    ports:
      - "3100:3100"
      - "3101:3101"
    volumes:
      - ./config:/etc/scp:ro
    restart: unless-stopped
    networks:
      - scp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - RUST_LOG=info
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - scp-network

networks:
  scp-network:
    driver: bridge

volumes:
  ollama_data:
