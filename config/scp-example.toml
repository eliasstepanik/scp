# SCP Hub Configuration Example
# This is a well-commented example configuration file for Docker deployments.
# Copy this to scp.toml and customize for your environment.

# Configuration version (required, must be 1)
config_version = 1

# ============================================================================
# Hub Configuration
# ============================================================================
[hub]
# Listen address for the main SCP Hub server
# Use "0.0.0.0" to listen on all interfaces (recommended for Docker)
listen_address = "0.0.0.0"

# Listen port for the main SCP Hub server
listen_port = 3100

# Supported transports: "stdio", "sse", "streamable_http"
transports = ["stdio"]

# Maximum number of concurrent client connections
max_clients = 100

# Session timeout in seconds (default: 3600 = 1 hour)
session_timeout_secs = 3600

# Maximum response size in bytes before truncation (1 MiB). Set explicitly for
# exec/shell backends to prevent memory spikes from extremely large tool responses.
max_response_size_bytes = 1048576

# Optional: Hub-wide bearer-token authentication.
# When set, every request to the hub (except /health and /metrics) must
# include the header:  Authorization: Bearer <your-secret-token-here>
# Requests without a valid token are rejected with HTTP 401.
#
# [hub.auth]
# bearer_token = "your-secret-token-here"

# Hub defaults
[hub.defaults]
# Token budget per request (default: 4000)
request_token_budget = 4000

# Token budget per session (default: 32000)
session_token_budget = 32000

# Maximum number of tools exposed per session (default: 20)
max_tools_exposed = 20

# Fanout timeout in seconds (default: 5)
fanout_timeout_secs = 5

# Rate limiting: max requests per minute (default: 100)
max_requests_per_min = 100

# Burst size for rate limiting (default: 20)
burst_size = 20

# Tool exposure controls — governs what tools/list returns to each client.
#
# Strategy: expose a small focused set in tools/list to keep LLM context lean,
# while allowing ALL registered tools to be called by qualified name (server/tool_name).
# Use scp_search to discover hidden tools at runtime.
[hub.defaults.exposure]

# Server names whose tools are ALWAYS included in tools/list, up to max_tools_exposed.
# Listed in priority order — first server fills slots before later ones.
# Tools from pinned servers count against max_tools_exposed.
# Individual tool pinning: use [[tool_index]] always_include = ["server/tool_name"].
#
# Example: pin SSH and memory tools while keeping n8n hidden until discovered via scp_search.
pinned_servers = ["ssh-proxy", "ssh-cortex", "memory-global", "task-mcp"]

# When true (default), tools/call routes any qualified 'server/tool_name' even if
# the tool was NOT present in the session's tools/list response.
# This makes hidden tools accessible: discover via scp_search, then call directly.
# When false: only tools visible in tools/list are callable (stricter, Phase 2 feature).
allow_unlisted_calls = true

# When true, scp_search results include the full inputSchema for each matching tool.
# Enables the LLM to call a discovered tool immediately without a second lookup.
# WARNING: complex tools (e.g. n8n) have large schemas — this increases response size.
# Default: false. Enable only if you need schema-aware one-shot tool discovery.
search_returns_schema = false

# ============================================================================
# Admin API Configuration
# ============================================================================
[admin]
# Listen address for the admin API
# Use "0.0.0.0" to listen on all interfaces (recommended for Docker)
listen_address = "0.0.0.0"

# Listen port for the admin API
listen_port = 3101

# ============================================================================
# Filter Configuration
# ============================================================================
[filter]
# Enable or disable filtering
enabled = true

# Filter mode: "allow" (whitelist) or "deny" (blacklist)
mode = "allow"

# List of tool patterns to allow/deny (regex patterns)
patterns = []

# ============================================================================
# Tool Index Configuration
# ============================================================================
[tool_index]
# Enable tool indexing
enabled = true

# Maximum number of tools to index
max_tools = 1000

# Individual tool qualified names to ALWAYS include in tools/list,
# regardless of server pinning or scoring. Use 'server/tool_name' format.
# These fill slots before pinned_servers tools.
# always_include = ["sequential-thinking/sequentialthinking"]
always_include = []

# ============================================================================
# Logging Configuration
# ============================================================================
[logging]
# Log level: "trace", "debug", "info", "warn", "error"
level = "info"

# Log format: "json" or "pretty"
format = "json"

# ============================================================================
# MCP Server Configurations
# ============================================================================
# Each [[servers]] section defines a connection to an MCP server.
# Multiple servers can be configured.

# Example: Local stdio-based MCP server
[[servers]]
# Unique name for this server
name = "example-server"

# Transport type: "stdio", "sse", "streamable_http"
transport = "stdio"

# For stdio transport: command to execute
command = "/path/to/mcp-server"

# Arguments to pass to the command
args = ["--config", "/etc/mcp/config.toml"]

# Sharing mode: "shared" (one instance for all clients), "pooled" (pool of instances), "dedicated" (one per client)
sharing = "shared"

# Pool size (only used if sharing = "pooled")
pool_size = 5

# Priority (higher = more preferred)
priority = 100

# Tags for categorizing this server
tags = ["example", "local"]

# Enable or disable this server
enabled = true

# Timeouts
[servers.timeouts]
# Connection timeout in seconds
connect_timeout_secs = 10

# Request timeout in seconds
request_timeout_secs = 30

# Idle timeout in seconds
idle_timeout_secs = 300

# Retries
[servers.retries]
# Maximum number of retries
max_retries = 3

# Backoff strategy: "exponential" or "linear"
backoff_strategy = "exponential"

# Initial backoff in milliseconds
initial_backoff_ms = 100

# Maximum backoff in milliseconds
max_backoff_ms = 5000

# Environment variables to pass to the server
[servers.env]
# Example: MCP_LOG_LEVEL = "debug"

# HTTP headers (for sse and streamable_http transports)
[servers.headers]
# Example: Authorization = "Bearer token"

# ============================================================================
# Example: HTTP-based MCP server (SSE transport)
# ============================================================================
# [[servers]]
# name = "http-server"
# transport = "sse"
# url = "http://mcp-server:8080/sse"
# sharing = "shared"
# priority = 50
# tags = ["http", "remote"]
# enabled = false
#
# [servers.timeouts]
# connect_timeout_secs = 10
# request_timeout_secs = 30
# idle_timeout_secs = 300
#
# [servers.headers]
# Authorization = "Bearer your-token-here"
